version: v1
name: buf.build/talos/api
build:
  excludes:
    - test/e2e/node_modules
    - website
    - docs
deps:
  - buf.build/googleapis/googleapis
  - buf.build/bufbuild/protovalidate
  - buf.build/grpc-ecosystem/grpc-gateway
breaking:
  use:
    - FILE
lint:
  use:
    - DEFAULT
  except:
    - PACKAGE_VERSION_SUFFIX
  ignore:
    - api/talos.openapi-v2.json
