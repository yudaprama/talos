services:
  postgres-test:
    image: postgres:16
    container_name: ory-talos-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: talos_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-test-data:/var/lib/postgresql/data

  mysql-test:
    image: mysql:8.0
    container_name: ory-talos-mysql-test
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: talos_test
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - mysql-test-data:/var/lib/mysql

  cockroach-test:
    image: cockroachdb/cockroach:latest-v25.4
    container_name: ory-talos-cockroach-test
    command: start-single-node --insecure
    ports:
      - "26258:26257"
      - "8081:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health?ready=1"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - cockroach-test-data:/cockroach/cockroach-data

volumes:
  postgres-test-data:
  mysql-test-data:
  cockroach-test-data:
