# Ory Talos OSS configuration (Supabase PostgreSQL)

serve:
  http:
    host: "0.0.0.0"
    port: 4420
    request_log:
      exclude_health_endpoints: true
    cors:
      enabled: true
      allowed_origins:
        - "*"
      allowed_methods:
        - "GET"
        - "POST"
        - "PUT"
        - "DELETE"
        - "PATCH"
      allowed_headers:
        - "Content-Type"
        - "Authorization"
      exposed_headers:
        - "Content-Type"
      allow_credentials: true
      max_age: 86400
      debug: false

  metrics:
    host: "0.0.0.0"
    port: 4422

credentials:
  issuer: "https://api.talos.local"
  api_keys:
    default_ttl: "720h"
    max_ttl: "8760h"
    prefix:
      current: "talos"
      retired: []
  derived_tokens:
    default_ttl: "1h"
    jwt:
      signing_keys:
        urls:
          - "base64://YOUR_BASE64_ENCODED_JWK_SET"
    macaroon:
      prefix:
        current: "mc"
        retired: []

db:
  # Ganti <USER>, <PASSWORD>, <HOST>, dan <DATABASE> dengan milikmu dari Supabase
  dsn: "postgres://<USER>:<PASSWORD>@<HOST>.supabase.co:5432/<DATABASE>?sslmode=require&pool_mode=standard&max_conns=25&max_conn_lifetime=5m"

log:
  level: "info"
  format: "json"

secrets:
  hmac:
    current: "replace-with-32-byte-secret"
    retired: []

tracing:
  enabled: true
  service_name: "ory-talos-oss"
  service_version: "dev"
  environment: "development"
  exporter: "otlp"
  endpoint: "localhost:4317"
  sample_rate: 1.0

cache:
  type: "noop"
  ttl: "5m"

multitenancy:
  enabled: false
