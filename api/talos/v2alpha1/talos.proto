// UpdateIssuedApiKeyRequest is the request for AdminUpdateIssuedApiKey.
//
// Follows AIP-134: the resource being updated is embedded directly. The
// `key_id` inside `issued_api_key` identifies which key to update, and only
// fields listed in `update_mask` are applied. Server-managed fields on
// IssuedApiKey (status, timestamps, revocation_*) are ignored on input.
message UpdateIssuedApiKeyRequest {
  IssuedApiKey issued_api_key = 1 [(buf.validate.field).required = true];

  // The list of fields to update. See AIP-134.
  google.protobuf.FieldMask update_mask = 2;
}

// RotateIssuedApiKeyRequest is the request for AdminRotateIssuedApiKey.
//
// Rotation is a custom method (AIP-136) that swaps an active key for a new
// one with a fresh secret and key_id, then revokes the old key. It is not a
// partial update, so it does not carry an update_mask. Mutable fields use
// presence-based semantics: an absent field inherits from the old key, while
// a present field (including an explicitly empty value) overrides.
message RotateIssuedApiKeyRequest {
  reserved 6;
  reserved "update_mask";

  // key_id is the ID of the existing API key to rotate
  string key_id = 1 [(buf.validate.field).string.min_len = 1];

  // name for the new API key. Absent (HasName() == false) inherits from the
  // old key; present (including empty string) overrides.
  optional string name = 2 [(buf.validate.field).string.max_len = 255];

  // scopes for the new API key. Absent (nil slice) inherits from the old key;
  // present (including empty list) overrides.
  repeated string scopes = 3 [(buf.validate.field).repeated = {
    max_items: 100,
    items: {
      string: {min_len: 1, max_len: 100}
    }
  }];

  // metadata for the new API key. Absent (nil) inherits from the old key;
  // present (including empty Struct) overrides.
  google.protobuf.Struct metadata = 4;

  // rate_limit_policy for the new API key. Absent inherits from the old key;
  // present overrides.
  optional RateLimitPolicy rate_limit_policy = 5;

  // ip_restriction for the new API key. Absent inherits from the old key;
  // present overrides.
  optional IPRestriction ip_restriction = 7;

  // Visibility for the new key. UNSPECIFIED inherits from the old key; any
  // other value overrides.
  KeyVisibility visibility = 8;
}

message RotateIssuedApiKeyResponse {
  // issued_api_key is the newly created API key with a new key_id and secret
  IssuedApiKey issued_api_key = 1;

  // secret is the new API key secret (only returned once, never retrievable again)
  string secret = 2;

  // old_issued_api_key is the previous API key (always revoked after rotation)
  IssuedApiKey old_issued_api_key = 3;
}

