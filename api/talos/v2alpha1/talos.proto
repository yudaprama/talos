// ImportApiKeyRequest imports an external HMAC-based API key
//
// Example:
//   {
//     "raw_key": "sk_live_abc123xyz789",
//     "name": "Stripe Production Key",
//     "actor_id": "payment-processor",
//     "scopes": ["read", "write"],
//     "ttl": "8760h",  // 1 year (also accepts: 31536000s)
//     "metadata": {"source": "stripe", "environment": "production"}
//   }
message ImportApiKeyRequest {
  string raw_key = 1 [(buf.validate.field).string = {min_len: 1, max_len: 4096}];   // The actual key string to import (REQUIRED)
  string name = 2 [(buf.validate.field).string = {min_len: 1, max_len: 255}];   // Human-readable name (REQUIRED)
  // actor_id is the identifier of the entity that owns this imported key.
  // Required so every imported key is traceable to an actor for revocation and
  // audit queries.
  string actor_id = 3 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
  repeated string scopes = 4 [(buf.validate.field).repeated = {
    max_items: 100,
    items: {
      string: {min_len: 1, max_len: 100}
    }
  }];  // Scopes for the imported key (OPTIONAL)
  // ttl sets the expiry as a duration from now. Encoded as a
  // google.protobuf.Duration (string ending in "s", e.g. "3600s").
  // Accepted bounds: 1s to 315360000s (~10 years). If unset or zero, the
  // project default TTL applies.
  // For convenience, the server also accepts Go-style duration strings
  // ("24h", "30m", "1h30m") and an extended unit set ("1d", "1w", "1mo",
  // "1y"; approximations: 1mo = 30d, 1y = 365d). Clients should prefer
  // the standard Duration encoding for portability.
  google.protobuf.Duration ttl = 5 [(buf.validate.field) = {
    ignore: IGNORE_IF_ZERO_VALUE,
    duration: {gte: {seconds: 1}, lte: {seconds: 315360000}}
  }];
  // metadata is a free-form JSON object for caller-defined attributes (e.g.,
  // source, environment, tags). Values may be strings, numbers, booleans,
  // arrays, objects, or null. Total serialized size is capped at 4KB.
  // AIP-148 metadata field.
  google.protobuf.Struct metadata = 6;
  optional RateLimitPolicy rate_limit_policy = 7;
  optional IPRestriction ip_restriction = 8;
  string request_id = 9 [(buf.validate.field).string = {max_len: 36}]; // Client-controlled idempotency key (AIP-155)
  KeyVisibility visibility = 10;
}

// BatchCreateImportedApiKeysRequest imports multiple external API keys in one request.
// The maximum batch size is 1000 keys.
message BatchCreateImportedApiKeysRequest {
  repeated ImportApiKeyRequest requests = 1 [(buf.validate.field).repeated = {min_items: 1, max_items: 1000}]; // Keys to import
}

// BatchCreateImportedApiKeysErrorCode classifies per-item batch import failures.
enum BatchCreateImportedApiKeysErrorCode {
  BATCH_CREATE_IMPORTED_API_KEYS_ERROR_UNSPECIFIED = 0;         // No error (import succeeded)
  BATCH_CREATE_IMPORTED_API_KEYS_ERROR_INVALID_ARGUMENT = 1;    // The key data is malformed or missing required fields
  BATCH_CREATE_IMPORTED_API_KEYS_ERROR_ALREADY_EXISTS = 2;      // A key with this identifier already exists
  BATCH_CREATE_IMPORTED_API_KEYS_ERROR_FAILED_PRECONDITION = 3; // State conflict prevents the import
  BATCH_CREATE_IMPORTED_API_KEYS_ERROR_INTERNAL = 4;            // Server error during import
  BATCH_CREATE_IMPORTED_API_KEYS_ERROR_RESOURCE_EXHAUSTED = 5;  // Per-tenant quota cap reached
}

// BatchCreateImportedApiKeysResult contains the result for one key in a batch import request.
message BatchCreateImportedApiKeysResult {
  int32 index = 1; // Zero-based index in request.requests
  ImportedApiKey imported_api_key = 2; // Set when import succeeds
  optional BatchCreateImportedApiKeysErrorCode error_code = 3; // Set when import fails
  optional string error_message = 4; // Human-readable failure reason
}

// BatchCreateImportedApiKeysResponse returns per-item results and summary counters.
message BatchCreateImportedApiKeysResponse {
  repeated BatchCreateImportedApiKeysResult results = 1;
  int32 success_count = 2;
  int32 failure_count = 3;
}

// ListImportedApiKeysRequest lists imported keys with filters
//
// Example:
//   GET /v2alpha1/admin/importedApiKeys?filter=status%3DKEY_STATUS_ACTIVE&page_size=50
message ListImportedApiKeysRequest {
  int32 page_size = 1 [(buf.validate.field).int32 = {gte: 0, lte: 1000}];  // Number of items per page (default: 50, max: 1000)
  string page_token = 2;       // Cursor token for pagination (OPTIONAL)
  // filter is an AIP-160 expression. Indexed fields (efficient at any scale):
  //   actor_id, status. Other fields are not indexed and may be rejected.
  // Examples:
  //   actor_id="user_123"
  //   status=KEY_STATUS_ACTIVE
  //   actor_id="user_123" AND status=KEY_STATUS_ACTIVE
  string filter = 3;
}

// ListImportedApiKeysResponse returns paginated list of imported keys
message ListImportedApiKeysResponse {
  repeated ImportedApiKey imported_api_keys = 1;    // List of imported keys
  string next_page_token = 2;  // Token for fetching the next page (empty if no more results)
}

// GetImportedApiKeyRequest retrieves a single imported key by its hash ID
