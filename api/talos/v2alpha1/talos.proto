syntax = "proto3";

package talos.v2alpha1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/empty.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

option go_package = "github.com/ory/talos/pkg/api/talos/v2alpha1;talosv2alpha1";

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Ory Talos API"
    version: "v2alpha1"
    description: "Ory Talos is a high-performance API key management service. "
        "It handles the full API key lifecycle: issuing keys, verifying them at low latency, "
        "deriving short-lived tokens (JWT and Macaroon), and revoking access.\n\n"
        "## Authentication\n\n"
        "`Admin*`-prefixed RPCs require admin authentication: send a bearer token in the "
        "`Authorization` header. Talos does not bundle an identity provider for the admin "
        "surface, so deploy it behind your own authentication and authorization. The "
        "self-service `RevokeApiKey` RPC is the exception: it authenticates by proof of "
        "possession (the caller supplies the raw credential secret) and needs no admin token.\n\n"
        "## API surfaces\n\n"
        "Talos is a single binary with three deployment modes: **admin** (the full lifecycle "
        "and verification surface), **self-service** (only proof-of-possession self-revocation "
        "for credential holders), and **all-in-one** (both surfaces in one process). Run the "
        "admin and self-service surfaces separately to keep the privileged API off the public "
        "network.\n\n"
        "## Requests and responses\n\n"
        "The API speaks JSON over HTTP. All paths are versioned under `/v2alpha1/`. Errors use "
        "the standard `google.rpc.Status` shape with a numeric `code`, a human-readable "
        "`message`, and a `details` array for machine-readable context.\n\n"
        "## Versioning and stability\n\n"
        "This is `v2alpha1`. While the API is in alpha, request and response shapes may change "
        "without notice. Pin to a specific build and review the release notes before upgrading."
  }
  tags: {
    name: "ApiKeys"
    description: "Administrative operations for managing API keys. "
        "Deploy behind authentication and authorization. "
        "Supports issued keys (generated by Talos), imported keys (from external systems), and key verification."
  }
};

// ApiKeys - Manages API key lifecycle and verification
//
// The ApiKeys service provides administrative operations for managing API keys.
// Deploy behind appropriate authentication and authorization.
//
// Key features:
// - API key lifecycle management (issue, verify, revoke, rotate, import)
// - Issued key management (keys generated by Talos)
// - Imported key management (keys from external systems)
// - Token derivation and minting (JWT and Macaroon)
// - API key verification (single and batch)
// - JWKS endpoint for public key distribution
service ApiKeys {
  // ============================================================================
  // Issued API Keys (CRUD)
  // ============================================================================

  // Issue API Key
  //
  // Creates a new API key for a given actor. The secret is returned only once
  // in the response and cannot be retrieved later. Keys can be scoped with
  // specific permissions and have optional expiration.
  //
  // ```http
  // POST /v2alpha1/admin/issuedApiKeys
  // {
  //   "name": "production-service",
  //   "actor_id": "user_123",
  //   "scopes": ["read", "write"],
  //   "ttl": "8760h"
  // }
  // ```
  rpc AdminIssueApiKey(IssueApiKeyRequest) returns (IssueApiKeyResponse) {
    option (google.api.http) = {
      post: "/v2alpha1/admin/issuedApiKeys"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      operation_id: "adminIssueApiKey"
      responses: {
        key: "201"
        value: { description: "API key issued successfully." }
      }
    };
  }

  // Get Issued API Key
  //
  // Retrieves details about a specific issued API key including its status,
  // scopes, expiration, and usage statistics. The secret is never returned.
  //
  // ```http
  // GET /v2alpha1/admin/issuedApiKeys/01HQZX9VYQKJB8XQZQXQZQXQXQ
  // ```
  rpc AdminGetIssuedApiKey(GetIssuedApiKeyRequest) returns (IssuedApiKey) {
    option (google.api.http) = {
      get: "/v2alpha1/admin/issuedApiKeys/{key_id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      operation_id: "adminGetIssuedApiKey"
    };
  }

  // List Issued API Keys
  //
  // Lists issued API keys with optional filtering. Supports cursor-based
  // pagination and AIP-160 filter expressions. Returns only issued
  // (generated) API keys; use ListImportedApiKeys for imported keys.
  //
  // ```http
  // GET /v2alpha1/admin/issuedApiKeys?page_size=50&filter=actor_id%3D%22user_123%22
  // ```
  rpc AdminListIssuedApiKeys(ListIssuedApiKeysRequest) returns (ListIssuedApiKeysResponse) {
    option (google.api.http) = {
      get: "/v2alpha1/admin/issuedApiKeys"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      operation_id: "adminListIssuedApiKeys"
    };
  }

  // Update Issued API Key
  //
  // Updates metadata, scopes, or rate limits of an issued key without rotating
  // the secret. Use RotateIssuedApiKey to change the secret.
  //
  // Follows AIP-134: the request body is the IssuedApiKey resource itself,
  // and the update_mask query parameter names the subset of fields to apply.
  // Omitting update_mask is equivalent to a mask of every populated field
  // in the body. To clear a field to its zero value, list it explicitly in
  // update_mask and leave it unset (or empty) in the body.
  //
  // ```http
  // PATCH /v2alpha1/admin/issuedApiKeys/01HQZX9VYQKJB8XQZQXQZQXQXQ?update_mask=scopes
  // {
  //   "issued_api_key": {
  //     "key_id": "01HQZX9VYQKJB8XQZQXQZQXQXQ",
  //     "scopes": ["read"]
  //   }
  // }
  // ```
  rpc AdminUpdateIssuedApiKey(UpdateIssuedApiKeyRequest) returns (IssuedApiKey) {
    option (google.api.http) = {
      patch: "/v2alpha1/admin/issuedApiKeys/{issued_api_key.key_id}"
      body: "issued_api_key"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      operation_id: "adminUpdateIssuedApiKey"
    };
  }

  // Rotate Issued API Key
  //
  // Generates a new secret for an issued API key. Creates a new API key with a
  // new key_id and secret, and immediately revokes the old key. This is the
  // recommended way to update scopes, metadata, or rotate credentials.
  //
  // For zero-downtime rotation, use this workflow instead:
  //   1. IssueApiKey with new credentials
  //   2. Deploy new secret to all services
  //   3. Verify new secret works everywhere
  //   4. AdminRevokeIssuedApiKey to remove the old key
  //
  // ```http
  // POST /v2alpha1/admin/issuedApiKeys/01HQZX9VYQKJB8XQZQXQZQXQXQ:rotate
  // {
  //   "scopes": ["read"]
  // }
  // ```
  rpc AdminRotateIssuedApiKey(RotateIssuedApiKeyRequest) returns (RotateIssuedApiKeyResponse) {
    option (google.api.http) = {
      post: "/v2alpha1/admin/issuedApiKeys/{key_id}:rotate"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      operation_id: "adminRotateIssuedApiKey"
      responses: {
        key: "201"
        value: { description: "API key rotated successfully. New key issued, old key revoked." }
      }
    };
  }

  // Revoke Issued API Key
  //
  // Immediately revokes an issued API key. Once revoked, the key can no longer
  // be used for authentication. This operation is irreversible. Revoked keys
  // are retained for audit purposes.
  //
  // ```http
  // POST /v2alpha1/admin/issuedApiKeys/01HQZX9VYQKJB8XQZQXQZQXQXQ:revoke
  // {
  //   "reason": "REVOCATION_REASON_KEY_COMPROMISE"
  // }
  // ```
  rpc AdminRevokeIssuedApiKey(RevokeIssuedApiKeyRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v2alpha1/admin/issuedApiKeys/{key_id}:revoke"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      operation_id: "adminRevokeIssuedApiKey"
      responses: {
        key: "204"
        value: { description: "API key revoked successfully." }
      }
    };
  }

  // ============================================================================
  // Imported API Keys (CRUD)
  // ============================================================================

  // Import API Key
  //
  // Imports an external API key into the system. Allows importing keys from
  // legacy systems or external providers. The raw key is hashed and stored
  // securely (HMAC). Imported keys support token derivation (JWT/Macaroon)
  // like issued keys.
  //
  // ```http
  // POST /v2alpha1/admin/importedApiKeys
  // {
  //   "raw_key": "sk_live_abc123xyz",
  //   "name": "Imported Stripe Key",
  //   "actor_id": "user_123"
  // }
  // ```
  rpc AdminImportApiKey(ImportApiKeyRequest) returns (ImportedApiKey) {
    option (google.api.http) = {
      post: "/v2alpha1/admin/importedApiKeys"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      operation_id: "adminImportApiKey"
      responses: {
        key: "201"
        value: { description: "API key imported successfully." }
      }
    };
  }

  // Batch Import API Keys
  //
  // Imports up to 1000 external API keys in one request. Returns per-item
  // results. If at least one item succeeds, response is 200 OK. If all items
  // fail, the endpoint returns a non-200 error.
  //
  // ```http
  // POST /v2alpha1/admin/importedApiKeys:batchCreate
  // {
  //   "requests": [
  //     {"raw_key": "sk_live_abc", "name": "Stripe key", "actor_id": "user_1"},
  //     {"raw_key": "ghp_xyz", "name": "GitHub PAT", "actor_id": "user_2"}
  //   ]
  // }
  // ```
  rpc AdminBatchCreateImportedApiKeys(BatchCreateImportedApiKeysRequest) returns (BatchCreateImportedApiKeysResponse) {
    option (google.api.http) = {
      post: "/v2alpha1/admin/importedApiKeys:batchCreate"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      operation_id: "adminBatchCreateImportedApiKeys"
      responses: {
        key: "200"
        value: { description: "Batch import completed. Check per-item results for individual status." }
      }
    };
  }

  // Update Imported API Key
  //
  // Updates metadata, scopes, or rate limits of an imported key. Supports
  // partial updates via the update_mask query parameter (AIP-134). Omitting
  // update_mask is equivalent to a mask of every populated field in the body.
  // To clear a field to its zero value, list it explicitly in update_mask and
  // leave it unset (or empty) in the body.
  //
  // ```http
  // PATCH /v2alpha1/admin/importedApiKeys/{key_id}?update_mask=name
  // {
  //   "imported_api_key": {
  //     "key_id": "{key_id}",
  //     "name": "New name"
  //   }
  // }
  // ```
  rpc AdminUpdateImportedApiKey(UpdateImportedApiKeyRequest) returns (ImportedApiKey) {
    option (google.api.http) = {
      patch: "/v2alpha1/admin/importedApiKeys/{imported_api_key.key_id}"
      body: "imported_api_key"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      operation_id: "adminUpdateImportedApiKey"
    };
  }

  // Get Imported API Key
  //
  // Retrieves details about a specific imported key. Returns metadata about
  // the imported key. The original raw key is never returned.
  //
  // ```http
  // GET /v2alpha1/admin/importedApiKeys/{key_id}
  // ```
  rpc AdminGetImportedApiKey(GetImportedApiKeyRequest) returns (ImportedApiKey) {
    option (google.api.http) = {
      get: "/v2alpha1/admin/importedApiKeys/{key_id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      operation_id: "adminGetImportedApiKey"
    };
  }

  // List Imported API Keys
  //
  // Lists all imported keys with filtering. Returns imported keys only (not
  // issued keys). Supports pagination and AIP-160 filter expressions.
  //
  // ```http
  // GET /v2alpha1/admin/importedApiKeys?page_size=50&filter=status%3DKEY_STATUS_ACTIVE
  // ```
  rpc AdminListImportedApiKeys(ListImportedApiKeysRequest) returns (ListImportedApiKeysResponse) {
    option (google.api.http) = {
      get: "/v2alpha1/admin/importedApiKeys"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      operation_id: "adminListImportedApiKeys"
    };
  }

  // Delete Imported API Key
  //
  // Permanently deletes an imported key (hard delete). The key is removed from
  // the database. Use AdminRevokeImportedApiKey for soft deletion (recommended).
  //
  // ```http
  // DELETE /v2alpha1/admin/importedApiKeys/{key_id}
  // ```
  rpc AdminDeleteImportedApiKey(DeleteImportedApiKeyRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/v2alpha1/admin/importedApiKeys/{key_id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      operation_id: "adminDeleteImportedApiKey"
      responses: {
        key: "204"
        value: { description: "Imported key deleted successfully." }
      }
    };
  }

  // Revoke Imported API Key
  //
  // Immediately revokes an imported API key. Once revoked, the key can no longer
  // be used for authentication. This operation is irreversible. Revoked keys
  // are retained for audit purposes.
  //
  // ```http
  // POST /v2alpha1/admin/importedApiKeys/9a3f051b2c7e8d4f1a6b9c0e5f2d8a3b:revoke
  // {
  //   "reason": "REVOCATION_REASON_KEY_COMPROMISE"
  // }
  // ```
  rpc AdminRevokeImportedApiKey(RevokeImportedApiKeyRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v2alpha1/admin/importedApiKeys/{key_id}:revoke"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      operation_id: "adminRevokeImportedApiKey"
      responses: {
        key: "204"
        value: { description: "API key revoked successfully." }
      }
    };
  }

  // ============================================================================
  // Unified Operations (work with both issued and imported keys)
  // ============================================================================

  // Revoke API Key (self-service)
  //
  // Proof-of-possession variant of revocation. The `Self*` prefix on the
  // request/response messages disambiguates from the admin variants
  // (`AdminRevokeIssuedApiKey` / `AdminRevokeImportedApiKey`).
  //
  // Allows an API key holder to revoke their own key. The caller must provide
  // the full API key secret as proof of possession. Supports issued API keys
  // and imported keys. JWT and macaroon tokens cannot be self-revoked (they
  // are stateless).
  //
  // The PRIVILEGE_WITHDRAWN reason is not allowed for self-revocation
  // (admin-only).
  //
  // ```http
  // POST /v2alpha1/apiKeys:selfRevoke
  // {
  //   "credential": "sk_live_abc123...",
  //   "reason": "REVOCATION_REASON_KEY_COMPROMISE"
  // }
  // ```
  rpc RevokeApiKey(SelfRevokeApiKeyRequest) returns (SelfRevokeApiKeyResponse) {
    option (google.api.http) = {
      post: "/v2alpha1/apiKeys:selfRevoke"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      operation_id: "revokeApiKey"
    };
  }

  // Derive Token
  //
  // Mints a short-lived JWT or Macaroon token from an API key. Works with both
  // issued and imported keys. The derived token inherits the permissions of the
  // parent API key.
  //
  // ```http
  // POST /v2alpha1/admin/apiKeys:derive
  // {
  //   "credential": "eyJhbGciOiJFZERTQSI...",
  //   "ttl": "1h"
  // }
  // ```
  rpc AdminDeriveToken(DeriveTokenRequest) returns (DeriveTokenResponse) {
    option (google.api.http) = {
      post: "/v2alpha1/admin/apiKeys:derive"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      operation_id: "adminDeriveToken"
    };
  }

  // ============================================================================
  // JWKS (shared)
  // ============================================================================

  // Get JWKS
  //
  // Returns the JSON Web Key Set for token verification. Provides the public
  // keys needed to verify JWT tokens issued by this service. Keys are loaded
  // from configuration (file://, https://, or base64:// URIs). Follows the
  // JWKS standard (RFC 7517).
  //
  // ```http
  // GET /v2alpha1/derivedKeys/jwks.json
  // ```
  rpc GetJwks(GetJWKSRequest) returns (GetJWKSResponse) {
    option (google.api.http) = {
      get: "/v2alpha1/derivedKeys/jwks.json"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      operation_id: "getJwks"
    };
  }

  // ============================================================================
  // Verification (Admin)
  // ============================================================================

  // Verify API Key
  //
  // Verifies a single API key or derived token. Validates the credential's
  // signature, expiration, and revocation status. Works with any credential
  // type (issued keys, imported keys, JWT, macaroon). The verification result
  // includes decoded claims and metadata — admin access only.
  //
  // Cache Control (HTTP Headers):
  //   - Cache-Control: no-cache  - Bypasses cache read, forces fresh DB lookup
  //   - Cache-Control: no-store  - Bypasses cache read AND write (never cached)
  //   - Pragma: no-cache         - Same as Cache-Control: no-cache (HTTP/1.0)
  //
  // ```http
  // POST /v2alpha1/admin/apiKeys:verify
  // {
  //   "credential": "sk_live_abc123..."
  // }
  // ```
  rpc AdminVerifyApiKey(VerifyApiKeyRequest) returns (VerifyApiKeyResponse) {
    option (google.api.http) = {
      post: "/v2alpha1/admin/apiKeys:verify"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      operation_id: "adminVerifyApiKey"
      parameters: {
        headers: {
          name: "Cache-Control"
          description: "Cache-directive controlling the verifier cache. "
              "`no-cache` forces a fresh database lookup (cache read is bypassed). "
              "`no-store` additionally prevents the result from being written to "
              "the cache. Any other value is ignored."
          type: STRING
        }
        headers: {
          name: "Pragma"
          description: "HTTP/1.0 alias for `Cache-Control: no-cache`. Behaves "
              "identically when set to `no-cache`; ignored otherwise."
          type: STRING
        }
      }
    };
  }

  // Ingest Usage (fork)
  //
  // Records token/cost usage for an actor and atomically debits the actor's
  // balance. Called by the external egent-metering service after each LLM call.
  // Idempotent via request_id. Admin access only.
  rpc AdminIngestUsage(IngestUsageRequest) returns (IngestUsageResponse) {
    option (google.api.http) = {
      post: "/v2alpha1/admin/usage:ingest"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      operation_id: "adminIngestUsage"
    };
  }

  // Batch Verify API Keys
  //
  // Verifies multiple credentials in a single request. Efficiently verifies up
  // to 100 credentials in parallel. Each credential is verified independently;
  // partial failures are returned. Admin access only.
  //
  // Cache Control (HTTP Headers):
  //   - Cache-Control: no-cache  - Bypasses cache read, forces fresh DB lookup
  //   - Cache-Control: no-store  - Bypasses cache read AND write (never cached)
  //   - Pragma: no-cache         - Same as Cache-Control: no-cache (HTTP/1.0)
  //
  // The cache directive applies to every credential in the batch.
  //
  // ```http
  // POST /v2alpha1/admin/apiKeys:batchVerify
  // {
  //   "requests": [
  //     {"credential": "sk_live_abc123..."},
  //     {"credential": "eyJhbGciOiJFZERTQSI..."}
  //   ]
  // }
  // ```
  rpc AdminBatchVerifyApiKeys(BatchVerifyApiKeysRequest) returns (BatchVerifyApiKeysResponse) {
    option (google.api.http) = {
      post: "/v2alpha1/admin/apiKeys:batchVerify"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      operation_id: "adminBatchVerifyApiKeys"
      parameters: {
        headers: {
          name: "Cache-Control"
          description: "Cache-directive controlling the verifier cache. "
              "`no-cache` forces a fresh database lookup (cache read is bypassed). "
              "`no-store` additionally prevents the result from being written to "
              "the cache. Any other value is ignored."
          type: STRING
        }
        headers: {
          name: "Pragma"
          description: "HTTP/1.0 alias for `Cache-Control: no-cache`. Behaves "
              "identically when set to `no-cache`; ignored otherwise."
          type: STRING
        }
      }
    };
  }
}

// ============================================================================
// Common Enums
// ============================================================================

// KeyStatus represents the lifecycle state of an API key.
enum KeyStatus {
  // Default zero value. Never returned by the server. Treated as ACTIVE for
  // backward compatibility but should not be relied on.
  KEY_STATUS_UNSPECIFIED = 0;
  // The key is valid and can be used to authenticate.
  KEY_STATUS_ACTIVE = 1;
  // The key was revoked. Verification fails with VERIFICATION_ERROR_REVOKED.
  // See revocation_reason for the cause.
  KEY_STATUS_REVOKED = 2;
  // The key passed its expire_time. Verification fails with
  // VERIFICATION_ERROR_EXPIRED. The transition is computed at read time and
  // not persisted.
  KEY_STATUS_EXPIRED = 3;
}

// KeyVisibility distinguishes public (client-safe) keys from secret (server-only) keys.
// Public keys use a different configurable prefix for visual distinction.
// Both types share the same scope/permission system — visibility is about exposure safety.
enum KeyVisibility {
  KEY_VISIBILITY_UNSPECIFIED = 0;  // Treated as SECRET
  KEY_VISIBILITY_SECRET = 1;
  KEY_VISIBILITY_PUBLIC = 2;
}

// RevocationReason provides structured revocation reasons inspired by RFC 5280.
// Used in both admin and self-revocation flows.
enum RevocationReason {
  // Default zero value. Use a specific reason; UNSPECIFIED is rejected by
  // admin and self-revocation endpoints.
  REVOCATION_REASON_UNSPECIFIED = 0;
  // The key was leaked or believed to be in the hands of an unauthorized
  // party.
  REVOCATION_REASON_KEY_COMPROMISE = 1;
  // The owning actor's relationship with the issuer changed (e.g., role
  // change, departure).
  REVOCATION_REASON_AFFILIATION_CHANGED = 2;
  // A new key has replaced this one as part of a rotation.
  REVOCATION_REASON_SUPERSEDED = 3;
  // Admin-only. The actor's privilege to use this key was withdrawn by
  // an operator. Self-revocation requests using this reason are rejected
  // with InvalidArgument. Pair with `description` on the admin revoke requests
  // to record the operator-supplied justification.
  REVOCATION_REASON_PRIVILEGE_WITHDRAWN = 4;
}

// TokenAlgorithm specifies the cryptographic algorithm used for derived tokens
// Note: API keys (root tokens) are always opaque; this enum is only for DeriveToken
enum TokenAlgorithm {
  TOKEN_ALGORITHM_UNSPECIFIED = 0;
  TOKEN_ALGORITHM_JWT = 1;      // JWT with EdDSA (self-contained, signed)
  TOKEN_ALGORITHM_MACAROON = 2; // Macaroon with HMAC (self-contained, caveat-based)
}

// ============================================================================
// Core Data Models
// ============================================================================

// IssuedApiKey represents an API key issued (generated) by Talos.
// Root keys are opaque v1 format tokens stored in the database.
// Derived tokens (JWT/Macaroon) are created via DeriveToken and are stateless (not stored).
message IssuedApiKey {
  string key_id = 1 [(buf.validate.field).string.min_len = 1];
  string name = 2 [(buf.validate.field).string.max_len = 255];
  string actor_id = 3;
  repeated string scopes = 4 [(buf.validate.field).repeated = {
