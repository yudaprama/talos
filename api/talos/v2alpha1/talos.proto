  string key_id = 1 [(buf.validate.field).string.min_len = 1]; // UUID of the issued key (REQUIRED)
  RevocationReason reason = 2;
  string description = 3; // Optional free-text explanation. Only allowed when reason is PRIVILEGE_WITHDRAWN.
}

// RevokeImportedApiKeyRequest revokes an imported API key by its key_id.
message RevokeImportedApiKeyRequest {
  string key_id = 1 [(buf.validate.field).string.min_len = 1]; // SHA-512/256 hash of the imported key (REQUIRED)
  RevocationReason reason = 2;
  string description = 3; // Optional free-text explanation. Only allowed when reason is PRIVILEGE_WITHDRAWN.
}

// Token derivation messages
message DeriveTokenRequest {
  string credential = 1 [(buf.validate.field).string = {min_len: 1, max_len: 4096}];  // The API key secret (issued or imported) to derive a token from
  TokenAlgorithm algorithm = 2;  // Algorithm for the derived token (jwt or macaroon)
  // ttl sets the expiry as a duration from now. Encoded as a
  // google.protobuf.Duration (string ending in "s", e.g. "3600s").
  // Accepted bounds: 1s to 315360000s (~10 years). If unset or zero, the
  // project default TTL applies.
  // For convenience, the server also accepts Go-style duration strings
  // ("24h", "30m", "1h30m") and an extended unit set ("1d", "1w", "1mo",
  // "1y"; approximations: 1mo = 30d, 1y = 365d). Clients should prefer
  // the standard Duration encoding for portability.
  google.protobuf.Duration ttl = 3 [(buf.validate.field) = {
    ignore: IGNORE_IF_ZERO_VALUE,
    duration: {gte: {seconds: 1}, lte: {seconds: 315360000}}
  }];
  repeated string scopes = 4 [(buf.validate.field).repeated = {
    max_items: 100,
    items: {
      string: {min_len: 1, max_len: 100}
    }
  }];
  // custom_claims is a JSON object whose entries are merged into the JWT
  // payload (or macaroon caveats) at signing time. Reserved JWT claims
  // (iss, sub, aud, exp, nbf, iat, jti) are rejected. Total serialized
  // size is capped at 4KB.
  google.protobuf.Struct custom_claims = 5;
}

message DeriveTokenResponse {
  Token token = 1;
}

// Signing key management messages
message GetJWKSRequest {
  // No fields needed - always uses default tenant
}

message GetJWKSResponse {
  // jwks is a JSON Web Key Set (RFC 7517). Always contains a single top-level
  // field "keys" whose value is an array of JWK objects. Each JWK has at
  // minimum a "kty" (key type), "kid" (key ID), and key-type-specific
  // material (e.g., "x" and "crv" for OKP/Ed25519, "n" and "e" for RSA).
  google.protobuf.Struct jwks = 1;
}

// ============================================================================
// Verification Messages
// ============================================================================

message VerifyApiKeyRequest {
  string credential = 1 [(buf.validate.field).string = {min_len: 1, max_len: 4096}]; // API key or derived token (any format: sk_*, JWT, macaroon)
}

// VerificationErrorCode provides type-safe error codes for verification failures
enum VerificationErrorCode {
  VERIFICATION_ERROR_UNSPECIFIED = 0;       // No error (key is valid)
  VERIFICATION_ERROR_INVALID_FORMAT = 1;    // Credential format is invalid
  VERIFICATION_ERROR_EXPIRED = 2;           // Credential has expired
  VERIFICATION_ERROR_REVOKED = 3;           // Credential has been revoked
  VERIFICATION_ERROR_NOT_FOUND = 4;         // Credential not found in database
  VERIFICATION_ERROR_SIGNATURE_INVALID = 5; // Cryptographic signature verification failed
  VERIFICATION_ERROR_INTERNAL = 6;          // Internal server error during verification
  VERIFICATION_ERROR_IP_NOT_ALLOWED = 7;    // Request IP is not in the key's allowed CIDR ranges
  VERIFICATION_ERROR_RATE_LIMITED = 8;      // Rate limit quota exhausted (commercial-only)
  VERIFICATION_ERROR_BALANCE_EXHAUSTED = 9; // Metering balance exhausted (fork)
}

message VerifyApiKeyResponse {
  // is_valid reports whether verification succeeded. It is true only when the
  // credential parses, the signature checks out, the key was found, all
  // policy gates (expiry, revocation, IP allowlist, rate limit) pass, and the
  // key's status is KEY_STATUS_ACTIVE. When false, error_code and
  // error_message describe the reason. Use this field for authentication
  // decisions; use status to inspect lifecycle state independently.
  bool is_valid = 1;
  string key_id = 2;
  string actor_id = 3;
  repeated string scopes = 4;
  google.protobuf.Timestamp expire_time = 5;
  // metadata mirrors the metadata stored on the verified key. AIP-148
  // metadata field.
  google.protobuf.Struct metadata = 6;
  optional VerificationErrorCode error_code = 7; // Only set if is_valid=false
  optional string error_message = 8; // Human-readable error message (only set if is_valid=false)
  optional RateLimitPolicy rate_limit_policy = 9;
  // Approximate number of requests available before the rate limit is reached
  // (commercial-only, only set when enforcement is active).
  optional int64 rate_limit_remaining = 10;
  // Time when the rate limiter returns to full capacity (all quota recovered).
  optional google.protobuf.Timestamp rate_limit_reset_time = 11;
  KeyVisibility visibility = 12;
  // The configured token issuer for this project. For derived tokens (JWT/macaroon),
  // this matches the iss claim embedded in the verified token.
  string issuer = 13;
  // status reports the lifecycle state of the verified key. It is
  // KEY_STATUS_UNSPECIFIED when the credential could not be resolved to a
  // stored key (for example, parse failures, invalid signatures, or unknown
  // keys). For derived tokens, status reflects the parent key. Disambiguates
  // verification success (is_valid) from key status, which previously
  // overloaded a single boolean.
  KeyStatus status = 14;
  // Metering balance remaining (micros). Set by the metering fork when a balance
  // policy is active for the actor; absent otherwise. 0 with quota 0 = unlimited.
  optional int64 balance_remaining = 15;
  // Metering quota / total grant (micros). 0 means unlimited (fork).
  optional int64 balance_quota = 16;
}

message BatchVerifyApiKeysRequest {
  repeated VerifyApiKeyRequest requests = 1 [(buf.validate.field).repeated = {min_items: 1, max_items: 100}];
}

message BatchVerifyApiKeysResponse {
  repeated VerifyApiKeyResponse results = 1;
}

// IngestUsageRequest records usage for an actor and debits its balance (fork).
// Called by the external egent-metering service after each LLM call.
message IngestUsageRequest {
  string actor_id = 1 [(buf.validate.field).string = {min_len: 1, max_len: 255}];
  string key_id = 2;                       // optional; derived/imported keys may omit
  string usage_type = 3;                   // e.g. "tokens"
  int64 usage_amount = 4;                  // e.g. prompt+completion token count
  int64 cost_micros = 5;                   // cost x 1_000_000 (integer money)
  string model = 6;
  optional string request_id = 7;          // idempotency key (AIP-155)
}

// IngestUsageResponse reports the post-debit balance (fork).
message IngestUsageResponse {
  int64 balance_remaining = 1;             // post-debit remaining (micros)
  int64 balance_quota = 2;                 // total grant (0 = unlimited)
  bool accepted = 3;                       // false if a duplicate request_id was ignored
}

// SelfRevokeApiKeyRequest allows an API key holder to revoke their own key
// by providing the full key secret as proof of possession.
message SelfRevokeApiKeyRequest {
  string credential = 1 [(buf.validate.field).string = {min_len: 1, max_len: 4096}];  // Full API key secret or imported key (REQUIRED)
  // reason explains why the holder is revoking the key. Must be one of
  // KEY_COMPROMISE, AFFILIATION_CHANGED, or SUPERSEDED. PRIVILEGE_WITHDRAWN
  // is admin-only and is rejected here with InvalidArgument.
  RevocationReason reason = 2;
}

// SelfRevokeApiKeyResponse is returned on successful self-revocation.
message SelfRevokeApiKeyResponse {
  // Empty on success
}
