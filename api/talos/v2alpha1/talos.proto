  repeated string scopes = 4 [(buf.validate.field).repeated = {
    max_items: 100,
    items: {
      string: {min_len: 1, max_len: 100}
    }
  }];
  // metadata is a free-form JSON object for caller-defined attributes
  // (e.g., source, environment, tags). Values may be strings, numbers,
  // booleans, arrays, objects, or null. Total serialized size is capped
  // at 4KB. AIP-148 metadata field.
  google.protobuf.Struct metadata = 5;
  KeyStatus status = 6;
  google.protobuf.Timestamp create_time = 7;
  google.protobuf.Timestamp update_time = 8;
  optional google.protobuf.Timestamp expire_time = 9;
  optional google.protobuf.Timestamp last_used_time = 10;
  optional RateLimitPolicy rate_limit_policy = 11;
  optional RevocationReason revocation_reason = 12;
  // revocation_description provides free-form context for a revocation.
