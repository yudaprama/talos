// IPRestriction defines IP-based access controls for an API key.
// When allowed_cidrs is non-empty, only requests from IPs matching at least one
// CIDR range are permitted. Empty allowed_cidrs means no IP restriction (all IPs allowed).
// IP restrictions apply to root API key and imported key verification only;
// derived tokens (JWT/macaroon) are stateless and not subject to IP checks.
message IPRestriction {
  // allowed_cidrs is a list of CIDR ranges that are allowed to use this key.
  // Supports both IPv4 (e.g., "10.0.0.0/8") and IPv6 (e.g., "2001:db8::/32").
  // If empty, all IPs are allowed (no restriction).
  repeated string allowed_cidrs = 1 [(buf.validate.field).repeated = {
    max_items: 50,
    items: {
      string: {min_len: 1, max_len: 50}
    }
  }];
}

// RateLimitPolicy describes the rate limit policy for an API key.
//
// In OSS mode, this policy is informational and meant to be consumed by
// upstream gateways (Envoy, Cloudflare, etc.) for enforcement.
// In commercial mode, Talos enforces rate limits using in-memory or Redis backends,
// both powered by the GCRA (Generic Cell Rate Algorithm).
