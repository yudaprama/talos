name: CI

on:
  push:
    branches: [dev, main, master]
    tags:
      - 'v*'
  pull_request:

jobs:
  lint-and-test-oss:
    name: Lint and test (OSS)
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/talos/lint-and-test-oss

  e2e-oss:
    name: E2E tests (OSS)
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/talos/e2e-oss

  docker-compose-oss:
    name: Docker Compose (OSS)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: ./.github/actions/talos/docker-compose-oss

  demo:
    name: Demo verification
    runs-on: ubuntu-latest
    needs: [lint-and-test-oss, e2e-oss]
    steps:
      - uses: ./.github/actions/talos/demo

  docs:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/talos/docs

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [lint-and-test-oss, e2e-oss, docker-compose-oss, demo, docs]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
