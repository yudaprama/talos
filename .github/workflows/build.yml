name: Build and Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Determine version
        id: ver
        run: echo "version=v${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Build linux-amd64
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath \
            -ldflags="-s -w -X github.com/ory/talos/internal/version.Version=${{ github.run_number }}" \
            -o dist/talos-linux-amd64 .

      - name: Build linux-arm64
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath \
            -ldflags="-s -w -X github.com/ory/talos/internal/version.Version=${{ github.run_number }}" \
            -o dist/talos-linux-arm64 .

      - name: Build darwin-amd64
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -trimpath \
            -ldflags="-s -w -X github.com/ory/talos/internal/version.Version=${{ github.run_number }}" \
            -o dist/talos-darwin-amd64 .

      - name: Build darwin-arm64
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -trimpath \
            -ldflags="-s -w -X github.com/ory/talos/internal/version.Version=${{ github.run_number }}" \
            -o dist/talos-darwin-arm64 .

      - name: Checksums
        run: sha256sum dist/* > dist/CHECKSUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
