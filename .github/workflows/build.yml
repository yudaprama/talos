name: build

# Build Talos binaries for Linux + macOS (amd64 & arm64) and publish a
# GitHub Release whenever a `v*` tag is pushed.
#
# This replaces the upstream Ory CI (.github/workflows/ci.yaml), which cannot
# run on this fork: it depends on commercial-only OpenAPI patches and on
# Ory-internal release secrets (ORY_BOT_PAT, GORELEASER_KEY, ...). With CGO
# disabled, a single Linux runner cross-compiles all four binaries, so no
# secrets and no macOS runners are required.

permissions:
  contents: write

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build binary
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_TIME="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          OUT="dist/talos-${GOOS}-${GOARCH}"
          mkdir -p dist
          go build -trimpath \
            -ldflags="-s -w \
              -X github.com/ory/talos/internal/version.Version=${VERSION} \
              -X github.com/ory/talos/internal/version.Commit=${COMMIT} \
              -X github.com/ory/talos/internal/version.BuildTime=${BUILD_TIME}" \
            -o "${OUT}" .
          echo "Built ${OUT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: talos-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/talos-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: dist/talos-*
          body: |
            Talos ${{ github.ref_name }}

            Static binaries built with CGO disabled, cross-compiled for:
            - `linux/amd64`
            - `linux/arm64`
            - `darwin/amd64`
            - `darwin/arm64`
          fail_on_unmatched_files: true
