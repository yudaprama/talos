name: Setup Go
description: Set up Go toolchain and caches. Called internally by Go composite actions.
inputs:
  go-version-file:
    description: Path to go.mod for version detection
    default: "go.mod"
  golangci-lint-version:
    description: golangci-lint version (used only by lint actions, declared here for forwarding)
    default: "v2.10.1"
  cache-version:
    description: Cache version; bump to invalidate all caches
    default: "v6"
runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: ${{ inputs.go-version-file }}
        check-latest: true
        cache: true
        cache-dependency-path: |
          go.sum
          tools/go.sum

    - name: Cache generated code
      id: cache-generated
      uses: actions/cache@v5
      with:
        path: .bin/doctest
        key:
          ${{ inputs.cache-version }}-codegen-${{ hashFiles('api/**/*.proto',
          'internal/config.schema.json',
          'website/docusaurus.config.ts', 'website/sidebar.ts',
          'internal/persistence/sqlc/**/*.sql', 'cmd/**/*.go',
          'go.sum') }}

    - name: Cache tools
      id: cache-tools
      uses: actions/cache@v5
      with:
        path: .bin/
        key:
          ${{ inputs.cache-version }}-tools-${{ runner.os }}-${{
          hashFiles('Makefile') }}

    - name: Install tools
      shell: bash
      working-directory: .
      run: make tools

    - name: Add talos .bin to PATH
      shell: bash
      run: echo "${GITHUB_WORKSPACE}/.bin" >> "$GITHUB_PATH"

    - name: Generate code
      if: steps.cache-generated.outputs.cache-hit != 'true'
      shell: bash
      working-directory: .
      run: rm -rf internal/persistence/sqlc/generated && make generate
