version: "2"
sql:
  - engine: "sqlite"
    queries: "queries.sql"
    # Use SQLite migrations directory directly for code generation
    schema: "../migrations/sqlite"
    gen:
      go:
        package: "db"
        out: "generated"
        emit_db_tags: true
        emit_json_tags: true
        emit_prepared_queries: true
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        emit_exported_queries: true
        emit_result_struct_pointers: false
        emit_params_struct_pointers: false
        emit_methods_with_db_argument: false
        emit_pointers_for_null_types: true
        emit_enum_valid_method: true
        emit_all_enum_values: true
        json_tags_case_style: "snake"
        output_models_file_name: "models.go"
        output_querier_file_name: "querier.go"
        query_parameter_limit: 3
        overrides:
          # Map enum INTEGER columns to int32 to match proto enum types (int32)
          # and commercial backends (Postgres/MySQL also generate int32)
          - column: "issued_api_keys.status"
            go_type: "int32"
          - column: "issued_api_keys.revocation_reason"
            go_type: "int32"
          - column: "imported_api_keys.status"
            go_type: "int32"
          - column: "imported_api_keys.revocation_reason"
            go_type: "int32"
          - column: "issued_api_keys.visibility"
            go_type: "int32"
          - column: "imported_api_keys.visibility"
            go_type: "int32"
          # Map UUID VARCHAR(36) columns to uuid.UUID so OSS SQLite generated
          # types match the contextx.NetworkIDFromContext return type and the
          # commercial Postgres backend (which uses native UUID columns).
          #
          # issued_api_keys.key_id is intentionally kept as string at the OSS
          # lingua franca level — db.IssuedApiKey is the shared shape used by
          # both issued and imported keys (via ImportedAPIKeyToIssuedAPIKey),
          # and imported keys store a SHA512/256 hash in KeyID, which cannot
          # be expressed as uuid.UUID. The Postgres/MySQL backends generate
          # IssuedApiKey.KeyID as uuid.UUID natively and convert to string at
          # the boundary.
          #
          # imported_api_keys.key_id is excluded — it stores a SHA512/256 hash
          # in VARCHAR(64), not a UUID. request_id is also excluded — it is an
          # opaque AIP-155 idempotency key, not a UUID.
          - column: "networks.id"
            go_type:
              import: "github.com/gofrs/uuid"
              type: "UUID"
          - column: "issued_api_keys.nid"
            go_type:
              import: "github.com/gofrs/uuid"
              type: "UUID"
          - column: "imported_api_keys.nid"
            go_type:
              import: "github.com/gofrs/uuid"
              type: "UUID"
        rename:
          nid: "NID"
