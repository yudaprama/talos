openapi: 3.0.3
info:
  description: |-
    Ory Talos is a high-performance API key management service. It handles the full API key lifecycle: issuing keys, verifying them at low latency, deriving short-lived tokens (JWT and Macaroon), and revoking access.

    ## Authentication

    `Admin*`-prefixed RPCs require admin authentication: send a bearer token in the `Authorization` header. Talos does not bundle an identity provider for the admin surface, so deploy it behind your own authentication and authorization. The self-service `RevokeApiKey` RPC is the exception: it authenticates by proof of possession (the caller supplies the raw credential secret) and needs no admin token.

    ## API surfaces

    Talos is a single binary with three deployment modes: **admin** (the full lifecycle and verification surface), **self-service** (only proof-of-possession self-revocation for credential holders), and **all-in-one** (both surfaces in one process). Run the admin and self-service surfaces separately to keep the privileged API off the public network.

    ## Requests and responses

    The API speaks JSON over HTTP. All paths are versioned under `/v2alpha1/`. Errors use the standard `google.rpc.Status` shape with a numeric `code`, a human-readable `message`, and a `details` array for machine-readable context.

    ## Versioning and stability

    This is `v2alpha1`. While the API is in alpha, request and response shapes may change without notice. Pin to a specific build and review the release notes before upgrading.
  title: Ory Talos API
  version: v2alpha1
servers:
- url: /
tags:
- description: "Administrative operations for managing API keys. Deploy behind authentication\
    \ and authorization. Supports issued keys (generated by Talos), imported keys\
    \ (from external systems), and key verification."
  name: ApiKeys
paths:
  /v2alpha1/admin/apiKeys:batchVerify:
    post:
      description: |-
        Verifies multiple credentials in a single request. Efficiently verifies up
        to 100 credentials in parallel. Each credential is verified independently;
        partial failures are returned. Admin access only.

        Cache Control (HTTP Headers):
          - Cache-Control: no-cache  - Bypasses cache read, forces fresh DB lookup
          - Cache-Control: no-store  - Bypasses cache read AND write (never cached)
          - Pragma: no-cache         - Same as Cache-Control: no-cache (HTTP/1.0)

        The cache directive applies to every credential in the batch.

        ```http
        POST /v2alpha1/admin/apiKeys:batchVerify
        {
          "requests": [
            {"credential": "sk_live_abc123..."},
            {"credential": "eyJhbGciOiJFZERTQSI..."}
          ]
        }
        ```
      operationId: adminBatchVerifyApiKeys
      parameters:
      - description: Cache-directive controlling the verifier cache. `no-cache` forces
          a fresh database lookup (cache read is bypassed). `no-store` additionally
          prevents the result from being written to the cache. Any other value is
          ignored.
        explode: false
        in: header
        name: Cache-Control
        required: false
        schema:
          type: string
        style: simple
      - description: "HTTP/1.0 alias for `Cache-Control: no-cache`. Behaves identically\
          \ when set to `no-cache`; ignored otherwise."
        explode: false
        in: header
        name: Pragma
        required: false
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchVerifyApiKeysRequest"
        required: true
        x-originalParamName: body
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchVerifyApiKeysResponse"
          description: A successful response.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
          description: An unexpected error response.
      summary: Batch Verify API Keys
      tags:
      - ApiKeys
  /v2alpha1/admin/apiKeys:derive:
    post:
      description: |-
        Mints a short-lived JWT or Macaroon token from an API key. Works with both
        issued and imported keys. The derived token inherits the permissions of the
        parent API key.

        ```http
        POST /v2alpha1/admin/apiKeys:derive
        {
          "credential": "eyJhbGciOiJFZERTQSI...",
          "ttl": "1h"
        }
        ```
      operationId: adminDeriveToken
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeriveTokenRequest"
        required: true
        x-originalParamName: body
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeriveTokenResponse"
          description: A successful response.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
          description: An unexpected error response.
      summary: Derive Token
      tags:
      - ApiKeys
  /v2alpha1/admin/apiKeys:verify:
    post:
      description: |-
        Verifies a single API key or derived token. Validates the credential's
        signature, expiration, and revocation status. Works with any credential
        type (issued keys, imported keys, JWT, macaroon). The verification result
        includes decoded claims and metadata — admin access only.

        Cache Control (HTTP Headers):
          - Cache-Control: no-cache  - Bypasses cache read, forces fresh DB lookup
          - Cache-Control: no-store  - Bypasses cache read AND write (never cached)
          - Pragma: no-cache         - Same as Cache-Control: no-cache (HTTP/1.0)

        ```http
        POST /v2alpha1/admin/apiKeys:verify
        {
          "credential": "sk_live_abc123..."
        }
        ```
      operationId: adminVerifyApiKey
      parameters:
      - description: Cache-directive controlling the verifier cache. `no-cache` forces
          a fresh database lookup (cache read is bypassed). `no-store` additionally
          prevents the result from being written to the cache. Any other value is
          ignored.
        explode: false
        in: header
        name: Cache-Control
        required: false
        schema:
          type: string
        style: simple
      - description: "HTTP/1.0 alias for `Cache-Control: no-cache`. Behaves identically\
          \ when set to `no-cache`; ignored otherwise."
        explode: false
        in: header
        name: Pragma
        required: false
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyApiKeyRequest"
        required: true
        x-originalParamName: body
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyApiKeyResponse"
          description: A successful response.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
          description: An unexpected error response.
      summary: Verify API Key
      tags:
      - ApiKeys
  /v2alpha1/admin/importedApiKeys:
    get:
      description: |-
        Lists all imported keys with filtering. Returns imported keys only (not
        issued keys). Supports pagination and AIP-160 filter expressions.

        ```http
        GET /v2alpha1/admin/importedApiKeys?page_size=50&filter=status%3DKEY_STATUS_ACTIVE
        ```
      operationId: adminListImportedApiKeys
      parameters:
      - description: "Number of items per page (default: 50, max: 1000)"
        explode: true
        in: query
        name: page_size
        required: false
        schema:
          format: int32
          type: integer
        style: form
      - description: Cursor token for pagination (OPTIONAL)
        explode: true
        in: query
        name: page_token
        required: false
        schema:
          type: string
        style: form
      - description: |-
          filter is an AIP-160 expression. Indexed fields (efficient at any scale):
            actor_id, status. Other fields are not indexed and may be rejected.
          Examples:
            actor_id="user_123"
            status=KEY_STATUS_ACTIVE
            actor_id="user_123" AND status=KEY_STATUS_ACTIVE
        explode: true
        in: query
        name: filter
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListImportedApiKeysResponse"
          description: A successful response.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
          description: An unexpected error response.
      summary: List Imported API Keys
      tags:
      - ApiKeys
    post:
      description: |-
        Imports an external API key into the system. Allows importing keys from
        legacy systems or external providers. The raw key is hashed and stored
        securely (HMAC). Imported keys support token derivation (JWT/Macaroon)
        like issued keys.

        ```http
        POST /v2alpha1/admin/importedApiKeys
        {
          "raw_key": "sk_live_abc123xyz",
          "name": "Imported Stripe Key",
          "actor_id": "user_123"
        }
        ```
      operationId: adminImportApiKey
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportApiKeyRequest"
        description: |-
          Example:
            {
              "raw_key": "sk_live_abc123xyz789",
              "name": "Stripe Production Key",
              "actor_id": "payment-processor",
              "scopes": ["read", "write"],
              "ttl": "8760h",  // 1 year (also accepts: 31536000s)
              "metadata": {"source": "stripe", "environment": "production"}
            }
        required: true
        x-originalParamName: body
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportedApiKey"
          description: A successful response.
        "201":
          content:
            application/json:
              schema: {}
          description: API key imported successfully.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
          description: An unexpected error response.
      summary: Import API Key
      tags:
      - ApiKeys
  /v2alpha1/admin/importedApiKeys/{imported_api_key.key_id}:
    patch:
      description: |-
        Updates metadata, scopes, or rate limits of an imported key. Supports
        partial updates via the update_mask query parameter (AIP-134). Omitting
        update_mask is equivalent to a mask of every populated field in the body.
        To clear a field to its zero value, list it explicitly in update_mask and
        leave it unset (or empty) in the body.

        ```http
        PATCH /v2alpha1/admin/importedApiKeys/{key_id}?update_mask=name
        {
          "imported_api_key": {
            "key_id": "{key_id}",
            "name": "New name"
          }
        }
        ```
      operationId: adminUpdateImportedApiKey
      parameters:
      - description: SHA-512/256 hash of credential
        explode: false
        in: path
        name: imported_api_key.key_id
        required: true
        schema:
          type: string
        style: simple
      - description: The list of fields to update. See AIP-134.
        explode: true
        in: query
        name: update_mask
        required: false
        schema:
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/adminUpdateImportedApiKey_request"
        required: true
        x-originalParamName: imported_api_key
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportedApiKey"
          description: A successful response.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
          description: An unexpected error response.
      summary: Update Imported API Key
      tags:
      - ApiKeys
  /v2alpha1/admin/importedApiKeys/{key_id}:
    delete:
      description: |-
        Permanently deletes an imported key (hard delete). The key is removed from
        the database. Use AdminRevokeImportedApiKey for soft deletion (recommended).

        ```http
        DELETE /v2alpha1/admin/importedApiKeys/{key_id}
        ```
      operationId: adminDeleteImportedApiKey
      parameters:
      - description: SHA512/256 hash of the imported key (REQUIRED)
        explode: false
        in: path
        name: key_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: A successful response.
        "204":
          content:
            application/json:
              schema: {}
          description: Imported key deleted successfully.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
          description: An unexpected error response.
      summary: Delete Imported API Key
      tags:
      - ApiKeys
    get:
      description: |-
        Retrieves details about a specific imported key. Returns metadata about
        the imported key. The original raw key is never returned.

        ```http
        GET /v2alpha1/admin/importedApiKeys/{key_id}
        ```
      operationId: adminGetImportedApiKey
      parameters:
      - description: SHA512/256 hash of the imported key (REQUIRED)
        explode: false
        in: path
        name: key_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportedApiKey"
          description: A successful response.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
          description: An unexpected error response.
      summary: Get Imported API Key
      tags:
      - ApiKeys
  /v2alpha1/admin/importedApiKeys/{key_id}:revoke:
    post:
      description: |-
        Immediately revokes an imported API key. Once revoked, the key can no longer
        be used for authentication. This operation is irreversible. Revoked keys
        are retained for audit purposes.

        ```http
        POST /v2alpha1/admin/importedApiKeys/9a3f051b2c7e8d4f1a6b9c0e5f2d8a3b:revoke
        {
          "reason": "REVOCATION_REASON_KEY_COMPROMISE"
        }
        ```
      operationId: adminRevokeImportedApiKey
      parameters:
      - description: SHA-512/256 hash of the imported key (REQUIRED)
        explode: false
        in: path
        name: key_id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminRevokeImportedApiKeyBody"
        required: true
        x-originalParamName: body
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: A successful response.
        "204":
          content:
            application/json:
              schema: {}
          description: API key revoked successfully.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
          description: An unexpected error response.
      summary: Revoke Imported API Key
      tags:
      - ApiKeys
  /v2alpha1/admin/importedApiKeys:batchCreate:
    post:
      description: |-
        Imports up to 1000 external API keys in one request. Returns per-item
        results. If at least one item succeeds, response is 200 OK. If all items
        fail, the endpoint returns a non-200 error.

        ```http
        POST /v2alpha1/admin/importedApiKeys:batchCreate
        {
          "requests": [
            {"raw_key": "sk_live_abc", "name": "Stripe key", "actor_id": "user_1"},
            {"raw_key": "ghp_xyz", "name": "GitHub PAT", "actor_id": "user_2"}
          ]
        }
        ```
      operationId: adminBatchCreateImportedApiKeys
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchCreateImportedApiKeysRequest"
        description: |-
          BatchCreateImportedApiKeysRequest imports multiple external API keys in one request.
          The maximum batch size is 1000 keys.
        required: true
        x-originalParamName: body
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchCreateImportedApiKeysResponse"
          description: Batch import completed. Check per-item results for individual
            status.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
          description: An unexpected error response.
      summary: Batch Import API Keys
      tags:
      - ApiKeys
  /v2alpha1/admin/issuedApiKeys:
    get:
      description: |-
        Lists issued API keys with optional filtering. Supports cursor-based
        pagination and AIP-160 filter expressions. Returns only issued
        (generated) API keys; use ListImportedApiKeys for imported keys.

        ```http
        GET /v2alpha1/admin/issuedApiKeys?page_size=50&filter=actor_id%3D%22user_123%22
        ```
      operationId: adminListIssuedApiKeys
      parameters:
      - description: "Number of items per page (default: 50, max: 1000)"
        explode: true
        in: query
        name: page_size
        required: false
        schema:
          format: int32
          type: integer
        style: form
      - description: Cursor token for pagination
        explode: true
        in: query
        name: page_token
        required: false
        schema:
          type: string
        style: form
      - description: |-
          filter is an AIP-160 expression. Indexed fields (efficient at any scale):
            actor_id, status. Other fields are not indexed and may be rejected.
          Examples:
            actor_id="user_123"
            status=KEY_STATUS_ACTIVE
            actor_id="user_123" AND status=KEY_STATUS_ACTIVE
        explode: true
        in: query
        name: filter
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListIssuedApiKeysResponse"
          description: A successful response.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
          description: An unexpected error response.
      summary: List Issued API Keys
      tags:
      - ApiKeys
    post:
      description: |-
        Creates a new API key for a given actor. The secret is returned only once
        in the response and cannot be retrieved later. Keys can be scoped with
        specific permissions and have optional expiration.

        ```http
        POST /v2alpha1/admin/issuedApiKeys
        {
          "name": "production-service",
          "actor_id": "user_123",
          "scopes": ["read", "write"],
          "ttl": "8760h"
        }
        ```
      operationId: adminIssueApiKey
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueApiKeyRequest"
        required: true
        x-originalParamName: body
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueApiKeyResponse"
          description: A successful response.
        "201":
          content:
            application/json:
              schema: {}
          description: API key issued successfully.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
          description: An unexpected error response.
      summary: Issue API Key
      tags:
      - ApiKeys
  /v2alpha1/admin/issuedApiKeys/{issued_api_key.key_id}:
    patch:
      description: |-
        Updates metadata, scopes, or rate limits of an issued key without rotating
        the secret. Use RotateIssuedApiKey to change the secret.

        Follows AIP-134: the request body is the IssuedApiKey resource itself,
        and the update_mask query parameter names the subset of fields to apply.
        Omitting update_mask is equivalent to a mask of every populated field
        in the body. To clear a field to its zero value, list it explicitly in
        update_mask and leave it unset (or empty) in the body.

        ```http
        PATCH /v2alpha1/admin/issuedApiKeys/01HQZX9VYQKJB8XQZQXQZQXQXQ?update_mask=scopes
        {
          "issued_api_key": {
            "key_id": "01HQZX9VYQKJB8XQZQXQZQXQXQ",
            "scopes": ["read"]
          }
        }
        ```
      operationId: adminUpdateIssuedApiKey
      parameters:
      - explode: false
        in: path
        name: issued_api_key.key_id
        required: true
        schema:
          type: string
        style: simple
      - description: The list of fields to update. See AIP-134.
        explode: true
        in: query
        name: update_mask
        required: false
        schema:
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/adminUpdateIssuedApiKey_request"
        required: true
        x-originalParamName: issued_api_key
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssuedApiKey"
          description: A successful response.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
          description: An unexpected error response.
      summary: Update Issued API Key
      tags:
      - ApiKeys
  /v2alpha1/admin/issuedApiKeys/{key_id}:
    get:
      description: |-
        Retrieves details about a specific issued API key including its status,
        scopes, expiration, and usage statistics. The secret is never returned.

        ```http
        GET /v2alpha1/admin/issuedApiKeys/01HQZX9VYQKJB8XQZQXQZQXQXQ
        ```
      operationId: adminGetIssuedApiKey
      parameters:
      - explode: false
        in: path
        name: key_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssuedApiKey"
          description: A successful response.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
          description: An unexpected error response.
      summary: Get Issued API Key
      tags:
      - ApiKeys
  /v2alpha1/admin/issuedApiKeys/{key_id}:revoke:
    post:
      description: |-
        Immediately revokes an issued API key. Once revoked, the key can no longer
        be used for authentication. This operation is irreversible. Revoked keys
        are retained for audit purposes.

        ```http
        POST /v2alpha1/admin/issuedApiKeys/01HQZX9VYQKJB8XQZQXQZQXQXQ:revoke
        {
          "reason": "REVOCATION_REASON_KEY_COMPROMISE"
        }
        ```
      operationId: adminRevokeIssuedApiKey
      parameters:
      - description: UUID of the issued key (REQUIRED)
        explode: false
        in: path
        name: key_id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminRevokeIssuedApiKeyBody"
        required: true
        x-originalParamName: body
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
          description: A successful response.
        "204":
          content:
            application/json:
              schema: {}
          description: API key revoked successfully.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
          description: An unexpected error response.
      summary: Revoke Issued API Key
      tags:
      - ApiKeys
  /v2alpha1/admin/issuedApiKeys/{key_id}:rotate:
    post:
      description: |-
        Generates a new secret for an issued API key. Creates a new API key with a
        new key_id and secret, and immediately revokes the old key. This is the
        recommended way to update scopes, metadata, or rotate credentials.

        For zero-downtime rotation, use this workflow instead:
          1. IssueApiKey with new credentials
          2. Deploy new secret to all services
          3. Verify new secret works everywhere
          4. AdminRevokeIssuedApiKey to remove the old key

        ```http
        POST /v2alpha1/admin/issuedApiKeys/01HQZX9VYQKJB8XQZQXQZQXQXQ:rotate
        {
          "scopes": ["read"]
        }
        ```
      operationId: adminRotateIssuedApiKey
      parameters:
      - description: key_id is the ID of the existing API key to rotate
        explode: false
        in: path
        name: key_id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminRotateIssuedApiKeyBody"
        required: true
        x-originalParamName: body
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RotateIssuedApiKeyResponse"
          description: A successful response.
        "201":
          content:
            application/json:
              schema: {}
          description: "API key rotated successfully. New key issued, old key revoked."
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
          description: An unexpected error response.
      summary: Rotate Issued API Key
      tags:
      - ApiKeys
  /v2alpha1/apiKeys:selfRevoke:
    post:
      description: |-
        Proof-of-possession variant of revocation. The `Self*` prefix on the
        request/response messages disambiguates from the admin variants
        (`AdminRevokeIssuedApiKey` / `AdminRevokeImportedApiKey`).

        Allows an API key holder to revoke their own key. The caller must provide
        the full API key secret as proof of possession. Supports issued API keys
        and imported keys. JWT and macaroon tokens cannot be self-revoked (they
        are stateless).

        The PRIVILEGE_WITHDRAWN reason is not allowed for self-revocation
        (admin-only).

        ```http
        POST /v2alpha1/apiKeys:selfRevoke
        {
          "credential": "sk_live_abc123...",
          "reason": "REVOCATION_REASON_KEY_COMPROMISE"
        }
        ```
      operationId: revokeApiKey
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SelfRevokeApiKeyRequest"
        description: |-
          SelfRevokeApiKeyRequest allows an API key holder to revoke their own key
          by providing the full key secret as proof of possession.
        required: true
        x-originalParamName: body
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SelfRevokeApiKeyResponse"
          description: A successful response.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
          description: An unexpected error response.
      summary: Revoke API Key (self-service)
      tags:
      - ApiKeys
  /v2alpha1/derivedKeys/jwks.json:
    get:
      description: |-
        Returns the JSON Web Key Set for token verification. Provides the public
        keys needed to verify JWT tokens issued by this service. Keys are loaded
        from configuration (file://, https://, or base64:// URIs). Follows the
        JWKS standard (RFC 7517).

        ```http
        GET /v2alpha1/derivedKeys/jwks.json
        ```
      operationId: getJwks
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetJWKSResponse"
          description: A successful response.
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
          description: An unexpected error response.
      summary: Get JWKS
      tags:
      - ApiKeys
