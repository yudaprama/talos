      default: NULL_VALUE
      description: |-
        `NullValue` is a singleton enumeration to represent the null value for the
        `Value` type union.

        The JSON representation for `NullValue` is JSON `null`.

         - NULL_VALUE: Null value.
      enum:
      - NULL_VALUE
      type: string
    RateLimitPolicy:
      description: |-
        RateLimitPolicy describes the rate limit policy for an API key.

        In OSS mode, this policy is informational and meant to be consumed by
        upstream gateways (Envoy, Cloudflare, etc.) for enforcement.
        In commercial mode, Talos enforces rate limits using in-memory or Redis backends,
        both powered by the GCRA (Generic Cell Rate Algorithm).

        Compliant with draft-ietf-httpapi-ratelimit-headers-10.
      example:
        unit: unit
        quota: quota
        window: window
      properties:
        quota:
          description: quota is the number of requests allowed per window.
          format: int64
          type: string
        unit:
          title: |-
            unit describes the quota unit type.
            Default: "requests"
            Other valid values per IETF spec: "content-bytes", "concurrent-requests"
          type: string
        window:
          description: |-
            window is the time window for the quota.
            Common values: 60s (1 minute), 3600s (1 hour), 86400s (1 day).
          type: string
      type: object
    RevocationReason:
      default: REVOCATION_REASON_UNSPECIFIED
      description: |-
        RevocationReason provides structured revocation reasons inspired by RFC 5280.
        Used in both admin and self-revocation flows.

         - REVOCATION_REASON_UNSPECIFIED: Default zero value. Use a specific reason; UNSPECIFIED is rejected by
        admin and self-revocation endpoints.
         - REVOCATION_REASON_KEY_COMPROMISE: The key was leaked or believed to be in the hands of an unauthorized
        party.
         - REVOCATION_REASON_AFFILIATION_CHANGED: The owning actor's relationship with the issuer changed (e.g., role
        change, departure).
         - REVOCATION_REASON_SUPERSEDED: A new key has replaced this one as part of a rotation.
         - REVOCATION_REASON_PRIVILEGE_WITHDRAWN: Admin-only. The actor's privilege to use this key was withdrawn by
        an operator. Self-revocation requests using this reason are rejected
        with InvalidArgument. Pair with `description` on the admin revoke requests
        to record the operator-supplied justification.
      enum:
      - REVOCATION_REASON_UNSPECIFIED
      - REVOCATION_REASON_KEY_COMPROMISE
      - REVOCATION_REASON_AFFILIATION_CHANGED
      - REVOCATION_REASON_SUPERSEDED
      - REVOCATION_REASON_PRIVILEGE_WITHDRAWN
      type: string
