        ip_restriction:
          allowed_cidrs:
          - allowed_cidrs
          - allowed_cidrs
      properties:
        ip_restriction:
          $ref: "#/components/schemas/IPRestriction"
        metadata:
          description: |-
            metadata for the new API key. Absent (nil) inherits from the old key;
            present (including empty Struct) overrides.
          type: object
        name:
          description: |-
            name for the new API key. Absent (HasName() == false) inherits from the
            old key; present (including empty string) overrides.
          type: string
        rate_limit_policy:
          $ref: "#/components/schemas/RateLimitPolicy"
        scopes:
          description: |-
