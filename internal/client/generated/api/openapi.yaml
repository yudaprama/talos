    KeyStatus:
      default: KEY_STATUS_UNSPECIFIED
      description: |-
        KeyStatus represents the lifecycle state of an API key.

         - KEY_STATUS_UNSPECIFIED: Default zero value. Never returned by the server. Treated as ACTIVE for
        backward compatibility but should not be relied on.
         - KEY_STATUS_ACTIVE: The key is valid and can be used to authenticate.
         - KEY_STATUS_REVOKED: The key was revoked. Verification fails with VERIFICATION_ERROR_REVOKED.
        See revocation_reason for the cause.
         - KEY_STATUS_EXPIRED: The key passed its expire_time. Verification fails with
        VERIFICATION_ERROR_EXPIRED. The transition is computed at read time and
        not persisted.
      enum:
      - KEY_STATUS_UNSPECIFIED
      - KEY_STATUS_ACTIVE
      - KEY_STATUS_REVOKED
      - KEY_STATUS_EXPIRED
      type: string
    KeyVisibility:
      default: KEY_VISIBILITY_UNSPECIFIED
      description: |-
        KeyVisibility distinguishes public (client-safe) keys from secret (server-only) keys.
        Public keys use a different configurable prefix for visual distinction.
        Both types share the same scope/permission system — visibility is about exposure safety.

         - KEY_VISIBILITY_UNSPECIFIED: Treated as SECRET
      enum:
      - KEY_VISIBILITY_UNSPECIFIED
      - KEY_VISIBILITY_SECRET
      - KEY_VISIBILITY_PUBLIC
      type: string
