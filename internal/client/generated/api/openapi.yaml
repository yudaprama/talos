        - TOKEN_ALGORITHM_JWT: JWT with EdDSA (self-contained, signed)
         - TOKEN_ALGORITHM_MACAROON: Macaroon with HMAC (self-contained, caveat-based)
      enum:
      - TOKEN_ALGORITHM_UNSPECIFIED
