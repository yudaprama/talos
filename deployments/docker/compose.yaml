version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: ory-talos-postgres
    environment:
      POSTGRES_USER: talos
      POSTGRES_PASSWORD: talos123
      POSTGRES_DB: talos
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talos"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ory-talos-network

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: ory-talos-redis
    command: redis-server --appendonly yes --requirepass redis123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ory-talos-network

  # Jaeger for tracing (development)
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: ory-talos-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "6831:6831/udp"   # Thrift Compact
      - "6832:6832/udp"   # Thrift Binary
      - "5778:5778"       # Config HTTP
      - "16686:16686"     # UI
      - "4317:4317"       # OTLP gRPC
      - "4318:4318"       # OTLP HTTP
      - "14250:14250"     # Model Proto
      - "14268:14268"     # Thrift HTTP
      - "14269:14269"     # Admin HTTP
      - "9411:9411"       # Zipkin
    networks:
      - ory-talos-network

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: ory-talos-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9092:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - ory-talos-network

  # Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: ory-talos-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - ory-talos-network

  # Ory Talos (uncomment to run with docker-compose)
  # talos:
  #   build:
  #     context: ../..
  #     dockerfile: deployments/docker/Dockerfile
  #   container_name: ory-talos-server
  #   environment:
  #     DB_DSN: "postgres://talos:talos123@postgres:5432/talos?sslmode=disable"
  #     REDIS_ADDR: "redis:6379"
  #     REDIS_PASSWORD: "redis123"
  #     OTEL_EXPORTER_OTLP_ENDPOINT: "jaeger:4317"
  #     TLS_ENABLED: "false"
  #   ports:
  #     - "4420:4420"  # HTTP API
  #     - "4422:4422"  # Metrics
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   networks:
  #     - ory-talos-network
  #   restart: unless-stopped

networks:
  ory-talos-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data: